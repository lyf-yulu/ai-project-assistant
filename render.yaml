# Render Blueprint — 一键部署
# 在 Render Dashboard 中连接 Git 仓库后自动识别此文件
services:
  - type: web
    name: ai-project-assistant
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && HF_HOME=/opt/render/project/src/.hf_cache python3 -c "from fastembed import TextEmbedding; m=TextEmbedding(model_name='BAAI/bge-small-zh-v1.5', cache_dir='/opt/render/project/src/.hf_cache'); print('model cached:', len(list(m.embed(['ready']))))"
    startCommand: ./backend/start.sh
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: KNOWLEDGE_DIR
        value: backend/knowledge
      - key: MAX_QUESTION_LENGTH
        value: "2000"
      - key: HF_HOME
        value: /opt/render/project/src/.hf_cache
